services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: customer360
      POSTGRES_USER: customer360
      POSTGRES_PASSWORD: customer360_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U customer360"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 5

  # One-shot service: runs Alembic migrations then seeds the database.
  # Exits after completion. Other services wait via service_completed_successfully.
  db-init:
    build: ./backend
    environment: &backend-env
      DATABASE_URL: postgresql+asyncpg://customer360:customer360_dev@postgres:5432/customer360
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      JWT_ALGORITHM: HS256
      JWT_EXPIRY_MINUTES: "480"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?Set ANTHROPIC_API_KEY in .env file}
      ANTHROPIC_MODEL: claude-sonnet-4-20250514
      LOG_LEVEL: INFO
      LOG_FORMAT: console
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head && python -m seeds.seed"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment: *backend-env
    depends_on:
      db-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    command: uvicorn app.main:create_app --factory --host 0.0.0.0 --port 8000 --reload

  worker-data:
    build: ./backend
    environment: *backend-env
    depends_on:
      db-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m workers.entrypoint data_store

  worker-metrics:
    build: ./backend
    environment: *backend-env
    depends_on:
      db-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m workers.entrypoint metrics

  worker-alerts:
    build: ./backend
    environment: *backend-env
    depends_on:
      db-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m workers.entrypoint alerts

  scheduler:
    build: ./backend
    environment: *backend-env
    depends_on:
      db-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m scheduler.runner

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  frontend_node_modules:
  postgres_data:
