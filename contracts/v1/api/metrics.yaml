# Customer 360 - Metrics API
# Story refs: US-3.1, US-3.2

bounded_context: metrics-engine
base_path: /api

endpoints:

  # --- GET /api/metrics/catalog ---
  - method: GET
    path: /metrics/catalog
    summary: List all available metrics with descriptions
    story_refs: [US-3.1]
    auth_required: true
    required_permission: metrics.catalog.read
    desc: Self-describing catalog for agent discovery and frontend labels/tooltips.

    request: {}

    response:
      200:
        body:
          metrics: { type: "MetricCatalogEntry[]", ref: models/metric.yaml#MetricCatalogEntry }
      401: { ref: common.yaml#error_response, desc: "Missing/invalid JWT" }
      403: { ref: common.yaml#error_response, desc: "Lacks metrics.catalog.read permission" }

  # --- GET /api/customers/{id}/metrics ---
  - method: GET
    path: /customers/{customer_id}/metrics
    summary: All computed metrics for a customer
    story_refs: [US-3.2]
    auth_required: true
    required_permission: metrics.read
    desc: Values are pre-computed by background jobs, so reads are O(1).

    request:
      path_params:
        - customer_id: { type: uuid }

    response:
      200:
        body:
          customer_id: { type: uuid }
          metrics:     { type: "CustomerMetricValue[]", ref: models/metric.yaml#CustomerMetricValue }
      401: { ref: common.yaml#error_response, desc: "Missing/invalid JWT" }
      403: { ref: common.yaml#error_response, desc: "Lacks metrics.read permission" }
      404: { ref: common.yaml#error_response }

  # --- POST /api/metrics/catalog ---
  - method: POST
    path: /metrics/catalog
    summary: Create a new metric definition (admin only)
    story_refs: []
    auth_required: true
    required_permission: metrics.catalog.manage
    desc: Add a new metric definition to the catalog.

    request:
      body:
        - name:         { type: string, required: true, max: 100, desc: "Machine-readable identifier (unique)" }
        - display_name: { type: string, required: true, max: 255 }
        - description:  { type: string, optional: true }
        - unit:         { type: string, optional: true, max: 50, examples: [count, score, days, percentage, currency] }
        - value_type:   { type: enum, required: true, ref: common.yaml#metric_value_type }

    response:
      201:
        body: { ref: models/metric.yaml#MetricCatalogEntry }
      400: { ref: common.yaml#error_response, desc: "Validation error (missing required fields)" }
      401: { ref: common.yaml#error_response, desc: "Missing/invalid JWT" }
      403: { ref: common.yaml#error_response, desc: "Lacks metrics.catalog.manage permission" }
      409: { ref: common.yaml#error_response, desc: "Metric name already exists" }

  # --- PATCH /api/metrics/catalog/{id} ---
  - method: PATCH
    path: /metrics/catalog/{id}
    summary: Update a metric definition (admin only)
    story_refs: []
    auth_required: true
    required_permission: metrics.catalog.manage
    soft_delete: return 404 if deleted_at IS NOT NULL

    request:
      path_params:
        - id: { type: uuid, desc: "MetricDefinition UUID" }
      body:
        - display_name: { type: string, optional: true, max: 255 }
        - description:  { type: string, optional: true }
        - unit:         { type: string, optional: true, max: 50 }
        - value_type:   { type: enum, optional: true, ref: common.yaml#metric_value_type }

    response:
      200:
        body: { ref: models/metric.yaml#MetricCatalogEntry }
      400: { ref: common.yaml#error_response, desc: "Validation error" }
      401: { ref: common.yaml#error_response, desc: "Missing/invalid JWT" }
      403: { ref: common.yaml#error_response, desc: "Lacks metrics.catalog.manage permission" }
      404: { ref: common.yaml#error_response }

  # --- DELETE /api/metrics/catalog/{id} ---
  - method: DELETE
    path: /metrics/catalog/{id}
    summary: Soft-delete a metric definition (admin only)
    story_refs: []
    auth_required: true
    required_permission: metrics.catalog.manage
    soft_delete: set deleted_at, return 204

    request:
      path_params:
        - id: { type: uuid, desc: "MetricDefinition UUID" }

    response:
      204: { desc: "Metric definition soft-deleted successfully (no body)" }
      401: { ref: common.yaml#error_response, desc: "Missing/invalid JWT" }
      403: { ref: common.yaml#error_response, desc: "Lacks metrics.catalog.manage permission" }
      404: { ref: common.yaml#error_response }

  # --- GET /api/customers/{id}/metrics/{metric_id}/history ---
  - method: GET
    path: /customers/{customer_id}/metrics/{metric_id}/history
    summary: Historical trend data for a specific customer metric
    story_refs: [US-3.2]
    auth_required: true
    required_permission: metrics.read
    desc: >
      Returns time-series data points from customer_metric_history.
      Used for trend charts and delta analysis. Data is append-only,
      written by the scheduler on each metric recomputation.

    request:
      path_params:
        - customer_id: { type: uuid }
        - metric_id:   { type: uuid, desc: "metric_definitions.id" }
      query_params:
        - since: { type: timestamp, optional: true, desc: "Data points after this time" }
        - until: { type: timestamp, optional: true, desc: "Data points before this time" }
        - limit: { type: integer, optional: true, default: 90, max: 365, desc: "Max data points to return" }

    response:
      200:
        body: { ref: models/metric.yaml#CustomerMetricTrend }
      401: { ref: common.yaml#error_response, desc: "Missing/invalid JWT" }
      403: { ref: common.yaml#error_response, desc: "Lacks metrics.read permission" }
      404: { ref: common.yaml#error_response, desc: "Customer or metric definition not found" }
