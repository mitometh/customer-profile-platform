# Customer 360 - Source Model
# Term definition: see _glossary.yaml

bounded_context: source-integration
scope: both

# --- Entity ---
entity:
  name: Source
  table: sources

  fields:
    - id:             { type: uuid, immutable: true }
    - name:           { type: string, max: 100, unique: true }
    - description:    { type: string, optional: true }
    - api_token_hash: { type: string, max: 255, write_only: true, desc: "Hashed API token for webhook authentication" }
    - is_active:      { type: boolean, default: true }
    - created_at:     { type: timestamp, auto: true }
    - created_by:     { type: uuid, nullable: true, ref: "users.id" }
    - updated_at:     { type: timestamp, auto: true }
    - updated_by:     { type: uuid, nullable: true, ref: "users.id" }
    - deleted_at:     { type: timestamp, nullable: true, indexed: true }
    - deleted_by:     { type: uuid, nullable: true, ref: "users.id" }

# --- Response Shapes ---
responses:

  SourceSummary:
    desc: Compact representation for agent tools and list views.
    used_by: agent tools get_sources_list, get_source_status
    fields: [id, name, description, is_active, created_at]
    notes:
      api_token_hash: "NEVER included in any response"
    example:
      id: "770e8400-e29b-41d4-a716-446655440020"
      name: "salesforce"
      description: "Salesforce CRM integration"
      is_active: true
      created_at: "2025-01-10T08:00:00Z"

  SourceDetail:
    desc: Full source details for admin views.
    used_by: GET /api/sources/{id}
    fields: [id, name, description, is_active, created_at, updated_at]
    notes:
      api_token_hash: "NEVER included in any response"

  SourceCreateResult:
    desc: Returned only at creation time. Includes raw API token (shown once).
    used_by: POST /api/sources
    fields: [id, name, api_token, is_active, created_at]
    notes:
      api_token: "Raw token shown only at creation. Caller must store securely. Cannot be retrieved again."
      api_token_hash: "NEVER included in any response"
